<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Card</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 630px;
            width: 1200px;
            background: linear-gradient(to right, #1a6b3c, #e0e0e0);
            color: white;
            font-family: 'Arial', sans-serif;
        }
        .card {
            text-align: center;
        }
        .title {
            font-size: 36px;
            margin: 0;
        }
        .subtitle {
            font-size: 24px;
            margin: 0;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title">Juan Manuel Orellana | Data Science & Analytics</h1>
        <h2 class="subtitle">Especialista en Python, Machine Learning, SQL y Business Analytics</h2>
    </div>
</body>
</html>
